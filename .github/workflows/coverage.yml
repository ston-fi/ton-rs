name: Coverage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage_ton_lib:
    runs-on: ubuntu-latest
    steps:
      - name: Install libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libsodium-dev libsecp256k1-dev liblz4-dev
          CLANG_BIN="$(command -v clang)"
          CLANGXX_BIN="$(command -v clang++)"
          sudo ln -sf "$CLANG_BIN" /usr/local/bin/clang-21
          sudo ln -sf "$CLANGXX_BIN" /usr/local/bin/clang++-21
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --lib --all --out Xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
