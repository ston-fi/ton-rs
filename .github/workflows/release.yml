name: Release-plz

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Configure release semver checks
        run: echo "$GITHUB_WORKSPACE/.github/scripts" >> "$GITHUB_PATH"
      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          CARGO_SEMVER_CHECKS_BIN: ${{ env.HOME }}/.cargo/bin/cargo-semver-checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_REGISTRY_TOKEN }}
