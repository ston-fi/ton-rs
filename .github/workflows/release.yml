name: Release-plz

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install release tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks@0.48.0,release-plz@0.3.159
      - name: Configure git user
        uses: release-plz/git-config@59144859caf016f8b817a2ac9b051578729173c4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run release-plz
        run: |
          export CARGO_SEMVER_CHECKS_BIN="$(command -v cargo-semver-checks)"
          export PATH="$GITHUB_WORKSPACE/.github/scripts:$PATH"
          release-plz release-pr \
            --git-token "$GITHUB_TOKEN" \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}"
          release-plz release \
            --git-token "$GITHUB_TOKEN" \
            --token "$CARGO_REGISTRY_TOKEN"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_REGISTRY_TOKEN }}
