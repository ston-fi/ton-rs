name: Build-Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_default_features:
    runs-on: ubuntu-latest
    steps:
      - name: Install clang toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          CLANG_BIN="$(command -v clang)"
          CLANGXX_BIN="$(command -v clang++)"
          sudo ln -sf "$CLANG_BIN" /usr/local/bin/clang-21
          sudo ln -sf "$CLANGXX_BIN" /usr/local/bin/clang++-21
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - run: rustup toolchain install nightly
      - run: rustup component add --toolchain nightly-x86_64-unknown-linux-gnu rustfmt
      - run: cargo +nightly fmt --check
      - run: cargo clippy
      - run: cargo test --lib --all --verbose --exclude examples
  build_all_features:
    runs-on: ubuntu-latest
    steps:
      - name: Install libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libsodium-dev libsecp256k1-dev liblz4-dev
          CLANG_BIN="$(command -v clang)"
          CLANGXX_BIN="$(command -v clang++)"
          sudo ln -sf "$CLANG_BIN" /usr/local/bin/clang-21
          sudo ln -sf "$CLANGXX_BIN" /usr/local/bin/clang++-21
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all --all-features --verbose
      - run: cargo clippy --fix --all-features
      - run: cargo test --lib --all --all-features
